services:
  - type: web
    name: docmind-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: GROQ_API_KEY
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
    disk:
      name: chroma_data
      mountPath: /opt/render/project/src/backend/chroma_data
      sizeGB: 1
