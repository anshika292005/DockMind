services:
  api:
    build:
      context: ./backend
    container_name: docmind-api
    env_file:
      - ./backend/.env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - chroma
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  chroma:
    image: chromadb/chroma:1.5.9
    container_name: docmind-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"

volumes:
  chroma_data:
